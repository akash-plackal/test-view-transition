<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link rel="stylesheet" href="../styles.css" />
    <script type="speculationrules">
      {
        "prerender": [
          {
            "source": "document",
            "where": { "href_matches": "/*" },
            "eagerness": "immediate"
          }
        ]
      }
    </script>
  </head>
  <body>
    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
    </nav>
    <main>
      <h1 class="title">About</h1>
      <p class="content">
        This is the about page. The navigation used the View Transition API with
        a prerendered page.
      </p>
    </main>
  </body>
</html>
