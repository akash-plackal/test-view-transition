<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="view-transition" content="same-origin" />
  <title>Home</title>
  <style>
    @view-transition {
      navigation: auto;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family:
        system-ui,
        -apple-system,
        sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    nav {
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem 2rem;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }

    nav a {
      color: #a0a0a0;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #fff;
    }

    main {
      padding: 4rem 2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .title {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      view-transition-name: title;
    }

    .content {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #999;
      view-transition-name: content;
    }

    /* View transition animations */

    /* Full page crossfade + slide */
    ::view-transition-old(root) {
      animation: page-out 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    ::view-transition-new(root) {
      animation: page-in 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* Title: big dramatic slide + scale */
    ::view-transition-old(title) {
      animation: title-out 0.4s cubic-bezier(0.4, 0, 1, 1) both;
    }

    ::view-transition-new(title) {
      animation: title-in 0.6s cubic-bezier(0, 0, 0.2, 1) 0.1s both;
    }

    /* Content: slide up from below with fade */
    ::view-transition-old(content) {
      animation: content-out 0.35s cubic-bezier(0.4, 0, 1, 1) both;
    }

    ::view-transition-new(content) {
      animation: content-in 0.6s cubic-bezier(0, 0, 0.2, 1) 0.2s both;
    }

    @keyframes page-out {
      to {
        opacity: 0;
        transform: scale(0.95);
        filter: blur(4px);
      }
    }

    @keyframes page-in {
      from {
        opacity: 0;
        transform: scale(1.05);
        filter: blur(4px);
      }
    }

    @keyframes title-out {
      to {
        opacity: 0;
        transform: translateX(-80px) scale(0.9);
      }
    }

    @keyframes title-in {
      from {
        opacity: 0;
        transform: translateX(80px) scale(0.9);
      }
    }

    @keyframes content-out {
      to {
        opacity: 0;
        transform: translateY(40px);
      }
    }

    @keyframes content-in {
      from {
        opacity: 0;
        transform: translateY(60px);
      }
    }
  </style>
  <script type="speculationrules">
      {
        "prerender": [
          {
            "source": "document",
            "where": { "href_matches": "/about" },
            "eagerness": "immediate"
          }
        ]
      }
    </script>
</head>

<body>
  <nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
  </nav>
  <main>
    <h1 class="title">Home</h1>
    <p class="content">
      Welcome to the home page. Click "About" to see the view transition in
      action.
    </p>
  </main>
</body>

</html>
