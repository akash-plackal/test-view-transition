<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="speculationrules">
    {
      "prerender": [
        {
          "source": "list",
          "urls": ["/about/"]
        }
      ]
    }
  </script>
  <title>Test A</title>
  <style>
    :root {
      --bg: #141a15;
      --surface: #1d2520;
      --fg: #d5d9c8;
      --muted: #a8b09b;
      --line: #465247;
      --link: #9fb378;
      --font: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    @view-transition {
      navigation: auto;
    }

    html,
    body {
      background: var(--bg);
    }

    ::view-transition {
      background: var(--bg);
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      mix-blend-mode: normal;
    }

    @media (prefers-reduced-motion: reduce) {

      ::view-transition-group(*),
      ::view-transition-old(*),
      ::view-transition-new(*) {
        animation: none !important;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--fg);
      font: 16px/1.5 var(--font);
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    main {
      width: min(100%, 42rem);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 2rem;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.2rem, 9vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      view-transition-name: heading;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      max-width: 36ch;
      font-size: 1.05rem;
    }

    a {
      color: var(--link);
      text-decoration-color: var(--line);
      text-underline-offset: 0.16em;
    }

    @keyframes heading-out {
      to {
        opacity: 0;
        transform: translateY(-1rem) scale(0.96);
      }
    }

    @keyframes heading-in {
      from {
        opacity: 0;
        transform: translateY(1rem) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    ::view-transition-old(heading) {
      animation: heading-out 220ms ease both;
      mix-blend-mode: normal;
    }

    ::view-transition-new(heading) {
      animation: heading-in 280ms cubic-bezier(0.22, 1, 0.36, 1) both;
      mix-blend-mode: normal;
    }
  </style>
</head>

<body>
  <main>
    <p>Minimal prerender + cross-document view transition test.</p>
    <h1>Page A</h1>
    <p><a href="/about/">Go to Page B</a></p>
  </main>
</body>

</html>
